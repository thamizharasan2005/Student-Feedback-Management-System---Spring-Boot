spring.application.name = FeedbackSystem

spring.datasource.url = jdbc:mysql://localhost:3306/feedback_db
spring.datasource.username = 'your database name'
spring.datasource.password = 'your database password'

spring.jpa.hibernate.ddl-auto = update
spring.jpa.show-sql = true

jwt.secret=MySuperSecretKey12345678901234567890123456789012
jwt.expirationInSec=43200
jwt.refreshExpirationMs=86400000

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username='your sending email'
spring.mail.password='applcation password of your email'
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
